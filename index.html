```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choudhry GITHUB</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:#e2e8f0;
margin:0;
padding:20px;
}

/* HEADER */

.header{
text-align:center;
background:#1e293b;
padding:20px;
border-radius:12px;
border:1px solid #334155;
}

#price{
font-size:3rem;
font-weight:bold;
}

#change{
font-size:1.2rem;
}

#marketInfo{
font-size:14px;
color:#94a3b8;
margin-top:6px;
}

/* TICKER */

.ticker-wrapper{
margin-top:20px;
overflow:hidden;
background:#1e293b;
border-radius:10px;
border:1px solid #334155;
}

.ticker{
white-space:nowrap;
padding:10px;
display:inline-block;
animation:scroll 18s linear infinite;
}

.ticker-wrapper:hover .ticker{
animation-play-state:paused;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* GRID */

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-top:20px;
}

.panel{
background:#1e293b;
padding:15px;
border-radius:12px;
border:1px solid #334155;
}

.panel h3{
margin-top:0;
border-bottom:2px solid #3b82f6;
padding-bottom:6px;
}

/* ROWS */

.data-row{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #334155;
}

/* NEWS */

.news-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-top:20px;
}

.news-column{
background:#1e293b;
padding:15px;
border-radius:12px;
border:1px solid #334155;
max-height:420px;
overflow-y:auto;
}

.news-item{
margin-bottom:12px;
}

.news-item a{
color:#60a5fa;
text-decoration:none;
}

.news-date{
font-size:12px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="header">

<small>NIFTY 50 LIVE</small>

<div id="marketInfo"></div>

<div id="price">Loading...</div>
<div id="change">--</div>

<div class="ticker-wrapper">
<div id="ticker" class="ticker">Loading ticker...</div>
</div>

</div>

<div class="grid">

<div class="panel">

<h3>Nifty Live Chart</h3>

<div id="tv_chart"></div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
  autosize:true,
  symbol:"NSE:NIFTY",
  interval:"5",
  timezone:"Asia/Kolkata",
  theme:"dark",
  style:"1",
  locale:"en",
  container_id:"tv_chart"
});
</script>

</div>

<div>

<div class="panel">

<h3>Global Markets</h3>
<div id="global"></div>

</div>

<div class="panel" style="margin-top:20px">

<h3>Commodities</h3>
<div id="commodities"></div>

</div>

</div>

</div>

<div class="news-grid">

<div class="news-column" id="toi">
<h3>TOI</h3>
<div class="content">Loading...</div>
</div>

<div class="news-column" id="livemint">
<h3>LiveMint</h3>
<div class="content">Loading...</div>
</div>

<div class="news-column" id="moneycontrol">
<h3>MoneyControl</h3>
<div class="content">Loading...</div>
</div>

</div>

<script>

const proxy="https://api.allorigins.win/raw?url=";

/* CLOCK */

function updateClock(){

const now=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"}));

const day=now.getDay();
const minutes=now.getHours()*60+now.getMinutes();

let status="";

if(day===0||day===6) status="🔴 MARKET CLOSED";
else if(minutes>=540&&minutes<555) status="⏳ PRE-OPEN";
else if(minutes>=555&&minutes<=930) status="🟢 MARKET OPEN";
else status="🔴 MARKET CLOSED";

const date=now.toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
const time=now.toLocaleTimeString("en-IN");

document.getElementById("marketInfo").innerHTML=date+" • "+time+" IST • "+status;

}

/* NIFTY */

async function fetchNifty(){

try{

const r=await fetch(proxy+encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/%5ENSEI"));

const d=await r.json();

const m=d.chart.result[0].meta;

const price=m.regularMarketPrice;

const change=price-m.previousClose;

const percent=(change/m.previousClose*100).toFixed(2);

const color=change>=0?"#22c55e":"#ef4444";

document.getElementById("price").innerText="₹"+price.toFixed(2);

document.getElementById("price").style.color=color;

document.getElementById("change").innerText=change.toFixed(2)+" ("+percent+"%)";

document.getElementById("change").style.color=color;

}catch{

document.getElementById("price").innerText="Data unavailable";

}

}

/* GLOBAL */

async function loadGlobal(){

const markets=[
{name:"Dow Jones",symbol:"%5EDJI"},
{name:"Nasdaq",symbol:"%5EIXIC"},
{name:"Gift Nifty",symbol:"NSEI=F"}
];

let html="";

for(const m of markets){

try{

const r=await fetch(proxy+encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+m.symbol));

const d=await r.json();

const meta=d.chart.result[0].meta;

const price=meta.regularMarketPrice;

const change=price-meta.previousClose;

const percent=(change/meta.previousClose*100).toFixed(2);

const color=change>=0?"#22c55e":"#ef4444";

html+=`<div class="data-row">
<span>${m.name}</span>
<span style="color:${color}">${price.toFixed(2)} (${percent}%)</span>
</div>`;

}catch{}

}

document.getElementById("global").innerHTML=html;

}

/* COMMODITIES */

async function loadCommodities(){

const commodities=[
{name:"WTI Crude",symbol:"CL=F"},
{name:"Gold",symbol:"GC=F"},
{name:"Silver",symbol:"SI=F"}
];

let html="";

for(const c of commodities){

try{

const r=await fetch(proxy+encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+c.symbol));

const d=await r.json();

const m=d.chart.result[0].meta;

const p=m.regularMarketPrice;

const ch=p-m.previousClose;

const per=(ch/m.previousClose*100).toFixed(2);

const color=ch>=0?"#22c55e":"#ef4444";

html+=`<div class="data-row">
<span>${c.name}</span>
<span style="color:${color}">${p.toFixed(2)} (${per}%)</span>
</div>`;

}catch{}

}

document.getElementById("commodities").innerHTML=html;

}

/* TICKER */

const stocks=[
"RELIANCE.NS","TCS.NS","HDFCBANK.NS","ICICIBANK.NS",
"INFY.NS","ITC.NS","LT.NS","SBIN.NS","BHARTIARTL.NS"
];

async function loadTicker(){

let html="";

for(const s of stocks){

try{

const r=await fetch(proxy+encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+s));

const d=await r.json();

const m=d.chart.result[0].meta;

const p=m.regularMarketPrice;

const c=p-m.previousClose;

const per=(c/m.previousClose*100).toFixed(2);

const color=c>=0?"#22c55e":"#ef4444";

html+=`<span style="margin-right:35px;color:${color}">
${s.replace(".NS","")} ₹${p.toFixed(0)} (${per}%)
</span>`;

}catch{}

}

document.getElementById("ticker").innerHTML=html;

}

/* RSS NEWS */

async function fetchRSS(url,id){

try{

const r=await fetch("https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(url));

const d=await r.json();

let html="";

for(let i=0;i<10;i++){

const n=d.items[i];

html+=`<div class="news-item">
<a href="${n.link}" target="_blank">${n.title}</a>
<div class="news-date">${new Date(n.pubDate).toDateString()}</div>
</div>`;

}

document.querySelector("#"+id+" .content").innerHTML=html;

}catch{}

}

/* RUN */

updateClock();
fetchNifty();
loadGlobal();
loadCommodities();
loadTicker();

fetchRSS("https://timesofindia.indiatimes.com/rssfeeds/1898055.cms","toi");
fetchRSS("https://www.livemint.com/rss/markets","livemint");
fetchRSS("https://www.moneycontrol.com/rss/marketreports.xml","moneycontrol");

setInterval(updateClock,1000);
setInterval(fetchNifty,60000);
setInterval(loadGlobal,120000);
setInterval(loadCommodities,120000);
setInterval(loadTicker,120000);

</script>

</body>
</html>
```
