```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Choudhary Githubd</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:#e2e8f0;
margin:0;
padding:20px;
}

.header{
text-align:center;
background:#1e293b;
padding:20px;
border-radius:12px;
border:1px solid #334155;
}

#price{
font-size:3rem;
font-weight:bold;
margin:10px 0;
}

#change{
font-size:1.2rem;
}

#marketInfo{
color:#94a3b8;
font-size:14px;
margin-top:6px;
}

/* search */

.search-box{
margin-top:15px;
}

.search-box input{
padding:10px;
border-radius:8px;
border:none;
width:220px;
}

.search-box button{
padding:10px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* ticker */

.ticker-wrapper{
margin-top:20px;
overflow:hidden;
background:#1e293b;
border-radius:10px;
border:1px solid #334155;
}

.ticker{
white-space:nowrap;
padding:10px;
display:inline-block;
animation:scroll 18s linear infinite;
}

.ticker-wrapper:hover .ticker{
animation-play-state:paused;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* market panels */

.market-panels{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.panel{
background:#1e293b;
border-radius:12px;
padding:15px;
border:1px solid #334155;
}

.panel h3{
margin-top:0;
border-bottom:2px solid #3b82f6;
padding-bottom:6px;
}

.stock-row{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #334155;
}

/* news */

.news-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-top:20px;
}

.news-column{
background:#1e293b;
padding:15px;
border-radius:12px;
border:1px solid #334155;
max-height:450px;
overflow-y:auto;
}

.news-column h3{
margin-top:0;
border-bottom:2px solid #3b82f6;
padding-bottom:8px;
}

.news-item{
margin-bottom:12px;
}

.news-item a{
color:#60a5fa;
text-decoration:none;
}

.news-date{
font-size:12px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="header">

<small>NIFTY 50 LIVE</small>

<div id="marketInfo"></div>

<div id="price">Loading...</div>
<div id="change">--</div>

<div class="search-box">
<input id="stockSearch" placeholder="Search stock (RELIANCE.NS)">
<button onclick="searchStock()">Search</button>
<div id="stockResult"></div>
</div>

<div class="ticker-wrapper">
<div id="ticker" class="ticker">Loading ticker...</div>
</div>

</div>

<div class="market-panels">

<div class="panel">
<h3>Top Gainers</h3>
<div id="gainers"></div>
</div>

<div class="panel">
<h3>Top Losers</h3>
<div id="losers"></div>
</div>

</div>

<div class="news-grid">

<div class="news-column" id="toi">
<h3>Times of India</h3>
<div class="content">Loading...</div>
</div>

<div class="news-column" id="livemint">
<h3>LiveMint</h3>
<div class="content">Loading...</div>
</div>

<div class="news-column" id="moneycontrol">
<h3>MoneyControl</h3>
<div class="content">Loading...</div>
</div>

</div>

<script>

const proxy="https://api.allorigins.win/raw?url=";

const stocks=[
"RELIANCE.NS","TCS.NS","HDFCBANK.NS","ICICIBANK.NS","INFY.NS",
"ITC.NS","LT.NS","SBIN.NS","BHARTIARTL.NS","KOTAKBANK.NS",
"ASIANPAINT.NS","AXISBANK.NS","BAJFINANCE.NS","HCLTECH.NS",
"MARUTI.NS","SUNPHARMA.NS","ULTRACEMCO.NS","WIPRO.NS"
];

/* MARKET CLOCK */

function updateClock(){

const now=new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"}));

const day=now.getDay();
const minutes=now.getHours()*60+now.getMinutes();

let status="";

if(day===0 || day===6){

status="🔴 MARKET CLOSED";

}
else if(minutes>=540 && minutes<555){

status="⏳ PRE-OPEN";

}
else if(minutes>=555 && minutes<=930){

status="🟢 MARKET OPEN";

}
else{

status="🔴 MARKET CLOSED";

}

const date=now.toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

const time=now.toLocaleTimeString("en-IN");

document.getElementById("marketInfo").innerHTML=date+" • "+time+" IST • "+status;

}

/* NIFTY */

async function fetchNifty(){

try{

const r=await fetch(proxy+encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/%5ENSEI?"+Date.now()));

const d=await r.json();

const m=d.chart.result[0].meta;

const price=m.regularMarketPrice;

const change=price-m.previousClose;

const percent=(change/m.previousClose*100).toFixed(2);

const color=change>=0?"#22c55e":"#ef4444";

document.getElementById("price").innerText="₹"+price.toFixed(2);

document.getElementById("price").style.color=color;

document.getElementById("change").innerText=change.toFixed(2)+" ("+percent+"%)";

document.getElementById("change").style.color=color;

}catch{

document.getElementById("price").innerText="Data unavailable";

}

}

/* STOCK SEARCH */

async function searchStock(){

const symbol=document.getElementById("stockSearch").value;

try{

const r=await fetch(proxy+encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+symbol));

const d=await r.json();

const m=d.chart.result[0].meta;

const p=m.regularMarketPrice;

const c=p-m.previousClose;

const per=(c/m.previousClose*100).toFixed(2);

const color=c>=0?"#22c55e":"#ef4444";

document.getElementById("stockResult").innerHTML=`<span style="color:${color}">${symbol} ₹${p.toFixed(2)} (${per}%)</span>`;

}catch{

document.getElementById("stockResult").innerText="Stock not found";

}

}

/* MARKET DATA */

async function loadMarket(){

let tickerHTML="";
let data=[];

for(const s of stocks){

try{

const r=await fetch(proxy+encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+s+"?"+Date.now()));

const d=await r.json();

if(!d.chart.result) continue;

const m=d.chart.result[0].meta;

const p=m.regularMarketPrice;

const c=p-m.previousClose;

const per=(c/m.previousClose*100);

data.push({symbol:s,per});

const color=c>=0?"#22c55e":"#ef4444";

tickerHTML+=`<span style="margin-right:35px;color:${color}">
${s.replace(".NS","")} ₹${p.toFixed(0)} (${per.toFixed(2)}%)
</span>`;

}catch{}

}

document.getElementById("ticker").innerHTML=tickerHTML;

data.sort((a,b)=>b.per-a.per);

let gHTML="";
let lHTML="";

for(let i=0;i<5;i++){

const g=data[i];
const l=data[data.length-1-i];

gHTML+=`<div class="stock-row"><span>${g.symbol.replace(".NS","")}</span><span style="color:#22c55e">${g.per.toFixed(2)}%</span></div>`;

lHTML+=`<div class="stock-row"><span>${l.symbol.replace(".NS","")}</span><span style="color:#ef4444">${l.per.toFixed(2)}%</span></div>`;

}

document.getElementById("gainers").innerHTML=gHTML;
document.getElementById("losers").innerHTML=lHTML;

}

/* RSS */

async function fetchRSS(url,id){

try{

const r=await fetch("https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(url));

const d=await r.json();

let html="";

for(let i=0;i<10;i++){

const n=d.items[i];

html+=`<div class="news-item">
<a href="${n.link}" target="_blank">${n.title}</a>
<div class="news-date">${new Date(n.pubDate).toDateString()}</div>
</div>`;

}

document.querySelector("#"+id+" .content").innerHTML=html;

}catch{}

}

/* RUN */

updateClock();
fetchNifty();
loadMarket();

fetchRSS("https://timesofindia.indiatimes.com/rssfeeds/1898055.cms","toi");
fetchRSS("https://www.livemint.com/rss/markets","livemint");
fetchRSS("https://www.moneycontrol.com/rss/marketreports.xml","moneycontrol");

setInterval(updateClock,1000);
setInterval(fetchNifty,60000);
setInterval(loadMarket,120000);

</script>

</body>
</html>
