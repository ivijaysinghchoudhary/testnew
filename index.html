```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nifty Dashboard</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#0f172a;
color:#e2e8f0;
margin:0;
padding:20px;
}

/* header */

.header{
text-align:center;
padding:20px;
background:#1e293b;
border-radius:15px;
margin-bottom:20px;
border:1px solid #334155;
}

#price{
font-size:3.5rem;
font-weight:bold;
}

#change{
font-size:1.2rem;
}

/* search */

.search-box{
margin-top:20px;
}

.search-box input{
padding:10px;
width:240px;
border-radius:8px;
border:none;
}

.search-box button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* ticker */

.ticker-wrapper{
margin-top:20px;
overflow:hidden;
background:#1e293b;
border-radius:10px;
border:1px solid #334155;
}

.ticker{
display:inline-block;
white-space:nowrap;
padding:10px;
animation:scrollTicker 30s linear infinite;
}

@keyframes scrollTicker{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* gainers losers */

.market-panels{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.panel{
background:#1e293b;
border-radius:12px;
padding:15px;
border:1px solid #334155;
}

.panel h3{
margin-top:0;
border-bottom:2px solid #3b82f6;
padding-bottom:8px;
}

.stock-row{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #334155;
}

/* news */

.news-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-top:20px;
}

.news-column{
background:#1e293b;
border-radius:12px;
padding:15px;
border:1px solid #334155;
max-height:500px;
overflow-y:auto;
}

.news-column h3{
margin-top:0;
border-bottom:2px solid #3b82f6;
padding-bottom:10px;
}

.news-item{
margin-bottom:12px;
}

.news-item a{
color:#60a5fa;
text-decoration:none;
}

.news-date{
font-size:12px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="header">

<small>NIFTY 50 LIVE</small>

<div id="marketInfo" style="margin-top:8px;font-size:14px;color:#94a3b8;"></div>

<div id="price">Loading...</div>
<div id="change">--</div>

<div class="search-box">

<input id="stockSearch" placeholder="Search stock (RELIANCE.NS)">
<button onclick="searchStock()">Search</button>

<div id="stockResult"></div>

</div>

<div class="ticker-wrapper">
<div class="ticker" id="ticker">Loading ticker...</div>
</div>

</div>

<div class="market-panels">

<div class="panel">
<h3>Top Gainers</h3>
<div id="gainers"></div>
</div>

<div class="panel">
<h3>Top Losers</h3>
<div id="losers"></div>
</div>

</div>

<div class="news-grid">

<div class="news-column" id="toi">
<h3>Times of India</h3>
<div class="content">Loading...</div>
</div>

<div class="news-column" id="livemint">
<h3>LiveMint</h3>
<div class="content">Loading...</div>
</div>

<div class="news-column" id="moneycontrol">
<h3>MoneyControl</h3>
<div class="content">Loading...</div>
</div>

</div>

<script>

const proxy="https://api.allorigins.win/raw?url=";

const stocks=[
"RELIANCE.NS","TCS.NS","HDFCBANK.NS","ICICIBANK.NS","INFY.NS",
"ITC.NS","LT.NS","SBIN.NS","BHARTIARTL.NS","KOTAKBANK.NS",
"ASIANPAINT.NS","AXISBANK.NS","BAJFINANCE.NS","HCLTECH.NS",
"MARUTI.NS","SUNPHARMA.NS","ULTRACEMCO.NS","WIPRO.NS"
];

/* NIFTY */

async function fetchNifty(){

try{

const r=await fetch(proxy+encodeURIComponent(
"https://query1.finance.yahoo.com/v8/finance/chart/%5ENSEI"
));

const d=await r.json();

const m=d.chart.result[0].meta;

const price=m.regularMarketPrice;

const change=price-m.previousClose;

const percent=(change/m.previousClose*100).toFixed(2);

const color=change>=0?"#22c55e":"#ef4444";

document.getElementById("price").innerText="₹"+price.toFixed(2);
document.getElementById("price").style.color=color;

document.getElementById("change").innerText=
(change.toFixed(2)+" ("+percent+"%)");

document.getElementById("change").style.color=color;

}
catch{

setTimeout(fetchNifty,5000);

}

}


/* STOCK SEARCH */

async function searchStock(){

const symbol=document.getElementById("stockSearch").value;

try{

const r=await fetch(proxy+encodeURIComponent(
"https://query1.finance.yahoo.com/v8/finance/chart/"+symbol
));

const d=await r.json();

const m=d.chart.result[0].meta;

const p=m.regularMarketPrice;

const c=p-m.previousClose;

const per=(c/m.previousClose*100).toFixed(2);

const color=c>=0?"#22c55e":"#ef4444";

document.getElementById("stockResult").innerHTML=
`<span style="color:${color}">
${symbol} ₹${p.toFixed(2)} (${c.toFixed(2)} | ${per}%)
</span>`;

}
catch{

document.getElementById("stockResult").innerText="Stock not found";

}

}


/* TICKER + MARKET DATA */

async function loadMarket(){

let tickerHTML="";
let data=[];

for(let s of stocks){

try{

const r=await fetch(proxy+encodeURIComponent(
"https://query1.finance.yahoo.com/v8/finance/chart/"+s
));

const d=await r.json();

const m=d.chart.result[0].meta;

const p=m.regularMarketPrice;

const c=p-m.previousClose;

const per=(c/m.previousClose*100);

data.push({symbol:s,p,c,per});

const color=c>=0?"#22c55e":"#ef4444";

tickerHTML+=
`<span style="margin-right:40px;color:${color}">
${s.replace(".NS","")} ₹${p.toFixed(0)}
(${per.toFixed(2)}%)
</span>`;

}
catch{}

}

document.getElementById("ticker").innerHTML=tickerHTML;

/* gainers losers */

data.sort((a,b)=>b.per-a.per);

let gainHTML="";
let loseHTML="";

for(let i=0;i<5;i++){

const g=data[i];
const l=data[data.length-1-i];

gainHTML+=
`<div class="stock-row">
<span>${g.symbol.replace(".NS","")}</span>
<span style="color:#22c55e">${g.per.toFixed(2)}%</span>
</div>`;

loseHTML+=
`<div class="stock-row">
<span>${l.symbol.replace(".NS","")}</span>
<span style="color:#ef4444">${l.per.toFixed(2)}%</span>
</div>`;

}

document.getElementById("gainers").innerHTML=gainHTML;
document.getElementById("losers").innerHTML=loseHTML;

}


/* RSS */

async function fetchRSS(url,id){

try{

const api="https://api.rss2json.com/v1/api.json?rss_url=";

const r=await fetch(api+encodeURIComponent(url));

const d=await r.json();

let html="";

for(let i=0;i<10;i++){

const n=d.items[i];

html+=
`<div class="news-item">
<a href="${n.link}" target="_blank">${n.title}</a>
<div class="news-date">${new Date(n.pubDate).toDateString()}</div>
</div>`;

}

document.querySelector("#"+id+" .content").innerHTML=html;

}
catch{}

}
function updateMarketClock(){

const now = new Date();

/* IST time */

const istTime = new Date(
now.toLocaleString("en-US", {timeZone: "Asia/Kolkata"})
);

const day = istTime.getDay();
const hour = istTime.getHours();
const minute = istTime.getMinutes();
const second = istTime.getSeconds();

const totalMinutes = hour*60 + minute;

let status = "";

/* NSE timing logic */

if(day === 0 || day === 6){

status="🔴 MARKET CLOSED (Weekend)";

}
else if(totalMinutes >= 540 && totalMinutes < 555){

status="⏳ PRE-OPEN";

}
else if(totalMinutes >= 555 && totalMinutes <= 930){

status="🟢 MARKET OPEN";

}
else{

status="🔴 MARKET CLOSED";

}

/* date */

const dateStr = istTime.toLocaleDateString("en-IN",{
weekday:"long",
day:"numeric",
month:"long",
year:"numeric"
});

/* time */

const timeStr = istTime.toLocaleTimeString("en-IN");

/* display */

document.getElementById("marketInfo").innerHTML =
dateStr + " • " + timeStr + " IST • " + status;

}

/* RUN */

fetchNifty();

loadMarket();

fetchRSS("https://timesofindia.indiatimes.com/rssfeeds/1898055.cms","toi");
fetchRSS("https://www.livemint.com/rss/markets","livemint");
fetchRSS("https://www.moneycontrol.com/rss/marketreports.xml","moneycontrol");

setInterval(fetchNifty,60000);
setInterval(loadMarket,120000);

updateMarketClock();
setInterval(updateMarketClock,1000);

</script>

</body>
</html>
```
